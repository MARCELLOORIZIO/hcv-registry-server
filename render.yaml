services:
  - type: web
    name: hcv-registry-server
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hcv-registry-postgres
          property: connectionString
      - key: PGSSLMODE
        value: require
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SIGILLUM_KYC_RETURN_URL
        value: https://hcv-registry-server.onrender.com/kyc-return
      - key: DEVICE_PROOF_MAX_AGE_MS
        value: "600000"
      - key: STRIPE_WEBHOOK_TOLERANCE_SECONDS
        value: "300"

databases:
  - name: hcv-registry-postgres
    region: frankfurt
    plan: basic-256mb
    databaseName: hcv_registry
    user: hcv_registry
    ipAllowList: []
